<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House Webpage</title>

    <!-- Tailwind CSS cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awsome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- custom css -->
     <link rel="stylesheet" href="./styles/styles.css">

     



</head>
<body class="primary-font">

    <header class=" min-h-[200px] max-w-[1250px] mx-auto mt-[50px] flex flex-col md:flex-row justify-between ">

        <div class="">
            <h1  class="text-[80px] text-[#1C1C1C] font-extrabold leading-[1.2]">It's good<br> tea time at The<br> Tea House</h1>
            <p class="text-[18px] my-8">Tea and Botanical Solutions Supplier Give Optimum<br> Satisfaction To Your Taste Buds.</p>
            <button class="w-[200px] h-[64px] text-xl text-white bg-gradient-to-r from-[#FF8938] to-[#F00] rounded-[10px] cursor-pointer">Explore More <span><i class="fa-solid fa-arrow-right -rotate-45"></i></span></button>
        </div>

        <div class=" relative">
            <img src="./images/banner.png" class="relative top-[100px]" alt="" >

            <div class=" w-[255px] h-[100px] bg-white flex items-center justify-center gap-2 rounded-xl shadow-2xl absolute left-[50px] ]">
                <span class="text-5xl"><i class="fa-solid fa-star"></i></span>
                <div>
                    <p class="text-[30px] font-extrabold text-[#1C1C1C]">5.00</p>
                    <p class="text-base text-[#777] font-semibold">Trust Pilot Ratings</p>
                </div>
            </div>
        </div>

    </header>

    
</body>
</html>
